# Inactive template. Copy into a repository workflow only after ops approval.
name: code-quality
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm check
      - run: corepack pnpm run check:secrets
