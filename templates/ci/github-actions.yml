# Inactive template. Copy via `cq ci install --target github --confirm` after ops approval.
# Design reservation: this package does not auto-enable .github/workflows.
name: code-quality
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
# No id-token, packages, or pull-requests write scopes.
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Enable package manager
        run: corepack enable
      - name: Install
        run: corepack pnpm install --frozen-lockfile
      - name: Release quality gate
        run: corepack pnpm check:release
      # Model review and forge publication are intentionally omitted:
      # CI runners must not hold production provider credentials by default.
